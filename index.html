<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Moto Route</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1114;--panel:#181b20;--border:#2a2d33;--text:#d4d4d8;
  --muted:#71717a;--accent:#e85d2a;--accent-dim:#e85d2a33;
  --avoid:#ef4444;--avoid-dim:#ef444433;--route:#3b82f6;
  --green:#22c55e;--green-dim:#22c55e33;
}
body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
#map{flex:1;z-index:1}
.search-bar{position:absolute;top:12px;left:12px;right:12px;z-index:1000;display:flex;flex-direction:column}
.search-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 4px 20px #0006}
.search-row{display:flex;align-items:center;gap:6px;padding:4px 10px}
.search-row+.search-row{border-top:1px solid var(--border)}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot-a{background:var(--green)}.dot-b{background:var(--accent)}
.search-row input{flex:1;background:none;border:none;color:var(--text);padding:10px 4px;font-size:14px;outline:none}
.search-row input::placeholder{color:var(--muted)}
.ib{background:none;border:none;color:var(--muted);cursor:pointer;padding:6px;font-size:16px;line-height:1;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.ib:hover{color:var(--text);background:var(--bg)}
.ib.loc:hover{color:var(--green);background:var(--green-dim)}
.ib.hid{display:none}
.sug-list{background:var(--panel);border:1px solid var(--border);border-radius:12px;margin-top:6px;max-height:240px;overflow-y:auto;display:none;box-shadow:0 4px 20px #0006}
.sug-list.open{display:block}
.si{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border)}
.si:last-child{border-bottom:none}
.si:hover,.si:active{background:var(--bg)}
.si-i{font-size:14px;margin-top:1px;flex-shrink:0;color:var(--muted)}
.si-m{font-size:13px;line-height:1.35}.si-s{font-size:11px;color:var(--muted);margin-top:1px}
.bottom-panel{background:var(--panel);border-top:1px solid var(--border);padding:10px 14px;z-index:1000;display:flex;flex-direction:column;gap:8px}
.ar{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.pill{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.pill:hover{border-color:var(--muted)}
.pill.on{background:var(--avoid);border-color:var(--avoid);color:#fff}
.pill.go{background:var(--accent);border-color:var(--accent);color:#fff}
.pill.go:disabled{opacity:.3;cursor:not-allowed}
.pill.go:not(:disabled):hover{filter:brightness(1.15)}
.pill.nav{background:var(--green);border-color:var(--green);color:#fff}
.pill.nav:disabled{opacity:.3;cursor:not-allowed}
.pill.exp{background:var(--route);border-color:var(--route);color:#fff}
.pill.exp:disabled{opacity:.3;cursor:not-allowed}
.chips{display:flex;gap:4px;flex-wrap:wrap}
.chip{display:flex;align-items:center;gap:3px;background:var(--avoid-dim);border:1px solid var(--avoid);color:var(--avoid);padding:2px 8px;border-radius:12px;font-size:11px;font-weight:500}
.chip button{background:none;border:none;color:var(--avoid);cursor:pointer;font-size:13px;line-height:1;padding:0 1px}
.stats{display:flex;gap:14px;font-size:12px;color:var(--muted)}
.stats .v{color:var(--text);font-weight:700}
.nav-hud{position:absolute;top:0;left:0;right:0;bottom:0;z-index:1500;pointer-events:none;display:none;flex-direction:column}
.nav-hud.active{display:flex}
.nav-top{pointer-events:all;background:var(--panel);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;flex-direction:column;gap:6px}
.nav-maneuver{font-size:22px;font-weight:700;line-height:1.2}
.nav-road{font-size:13px;color:var(--muted)}
.nav-dist{font-size:14px;color:var(--accent);font-weight:600}
.nav-bottom{pointer-events:all;margin-top:auto;background:var(--panel);border-top:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px}
.nav-eta{flex:1}
.nav-eta .ne-dist{font-size:16px;font-weight:700}
.nav-eta .ne-time{font-size:12px;color:var(--muted)}
.nav-end{padding:10px 20px;border-radius:20px;background:var(--avoid);border:none;color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.nav-mute{padding:10px 14px;border-radius:20px;background:var(--border);border:none;color:var(--text);font-size:13px;cursor:pointer}
.modal-bg{position:fixed;inset:0;background:#000a;z-index:3000;display:none;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:20px;width:min(320px,90vw);display:flex;flex-direction:column;gap:12px}
.modal h3{font-size:15px;font-weight:700}
.modal-btn{display:flex;align-items:center;gap:10px;padding:14px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-size:14px;text-align:left;text-decoration:none;width:100%}
.modal-btn:hover{background:var(--bg);border-color:var(--muted)}
.modal-btn .mb-icon{font-size:20px;flex-shrink:0}
.modal-btn .mb-sub{font-size:11px;color:var(--muted)}
.modal-close{align-self:center;padding:8px 20px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:12px}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--border);color:var(--text);padding:7px 16px;border-radius:20px;font-size:12px;z-index:2000;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
.leaflet-container{background:var(--bg)!important}
.mk{display:flex;align-items:center;justify-content:center;border-radius:50%;font-weight:700;color:#fff;box-shadow:0 2px 8px #0008}
.mk-a{background:var(--green);width:28px;height:28px;font-size:12px}
.mk-b{background:var(--accent);width:28px;height:28px;font-size:12px}
.mk-x{background:var(--avoid);width:22px;height:22px;font-size:13px}
.mk-me{width:16px;height:16px;background:var(--route);border:3px solid #fff;border-radius:50%;box-shadow:0 0 12px #3b82f688}
.ctx{position:fixed;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:4px 0;z-index:3000;min-width:150px;box-shadow:0 8px 24px #000a}
.ctx button{display:block;width:100%;text-align:left;background:none;border:none;color:var(--text);padding:9px 14px;font-size:13px;cursor:pointer}
.ctx button:hover{background:var(--border)}
.ctx .cl{font-size:10px;color:var(--muted);padding:6px 14px 2px;text-transform:uppercase;letter-spacing:.5px}
.avoid-line{stroke:var(--avoid);stroke-width:6;stroke-opacity:.7;stroke-dasharray:8,6}
</style>
</head>
<body>
<div id="map"></div>

<div class="search-bar" id="planSearch">
  <div class="search-card">
    <div class="search-row">
      <div class="dot dot-a"></div>
      <input id="inA" placeholder="Starting point" oninput="onType('a')" onfocus="onFocus('a')"/>
      <button class="ib hid" id="clrA" onclick="clrPt('a')">&times;</button>
      <button class="ib loc" onclick="useLoc('a')" title="My location">&#9678;</button>
    </div>
    <div class="search-row">
      <div class="dot dot-b"></div>
      <input id="inB" placeholder="Destination" oninput="onType('b')" onfocus="onFocus('b')"/>
      <button class="ib hid" id="clrB" onclick="clrPt('b')">&times;</button>
    </div>
  </div>
  <div class="sug-list" id="sugBox"></div>
</div>

<div class="bottom-panel" id="planPanel">
  <div class="ar">
    <button class="pill go" id="goBtn" onclick="calcRoute()" disabled>Route</button>
    <button class="pill nav" id="navBtn" onclick="startNav()" disabled>Navigate</button>
    <button class="pill exp" id="expBtn" onclick="openExport()" disabled>Export</button>
    <button class="pill" id="avBtn" onclick="togAvoid()">+ Avoid</button>
    <button class="pill" onclick="clearAll()">Clear</button>
  </div>
  <div class="chips" id="chipBox"></div>
  <div class="stats" id="statsBox"></div>
</div>

<div class="nav-hud" id="navHud">
  <div class="nav-top">
    <div class="nav-dist" id="navDist"></div>
    <div class="nav-maneuver" id="navMan">Calculating...</div>
    <div class="nav-road" id="navRoad"></div>
  </div>
  <div class="nav-bottom">
    <div class="nav-eta">
      <div class="ne-dist" id="navRemain"></div>
      <div class="ne-time" id="navEta"></div>
    </div>
    <button class="nav-mute" id="muteBtn" onclick="togMute()">Mute</button>
    <button class="nav-end" onclick="endNav()">End</button>
  </div>
</div>

<div class="modal-bg" id="exportModal">
  <div class="modal">
    <h3>Export Route</h3>
    <a class="modal-btn" id="expGoogle" href="#" target="_blank">
      <span class="mb-icon">&#127758;</span>
      <div><div>Google Maps</div><div class="mb-sub">Opens with waypoints to preserve avoided roads</div></div>
    </a>
    <a class="modal-btn" id="expApple" href="#" target="_blank">
      <span class="mb-icon">&#128506;</span>
      <div><div>Apple Maps</div><div class="mb-sub">Start and destination with waypoints</div></div>
    </a>
    <button class="modal-btn" id="expCopy" onclick="copyRouteLink()">
      <span class="mb-icon">&#128203;</span>
      <div><div>Copy Google Maps Link</div><div class="mb-sub">Paste into any app</div></div>
    </button>
    <button class="modal-close" onclick="closeExport()">Cancel</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="ctx" id="ctx" style="display:none"></div>

<script>
const VALHALLA='https://valhalla1.openstreetmap.de';
const map=L.map('map',{zoomControl:false}).setView([40.76,-111.89],11);
L.control.zoom({position:'bottomright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'',maxZoom:19}).addTo(map);

let ptA=null,ptB=null,mkA=null,mkB=null,mkMe=null;
let avoids=[],routeLn=null,avoidOn=false;
let gTimer=null,curSug='a',sugArr=[];
let routeSteps=[],routeCoords=[],routeMeta=null;
let navActive=false,navWatchId=null,navStepIdx=0,navMuted=false,wakeLock=null;

function ic(c,l){return L.divIcon({className:'',html:'<div class="mk '+c+'">'+l+'</div>',iconSize:c==='mk-me'?[16,16]:[28,28],iconAnchor:c==='mk-me'?[8,8]:[14,14]})}

// Decode Valhalla encoded polyline (precision 6)
function decodePoly(str){
  let idx=0,lat=0,lng=0,coords=[];
  while(idx<str.length){
    let b,shift=0,result=0;
    do{b=str.charCodeAt(idx++)-63;result|=(b&0x1f)<<shift;shift+=5}while(b>=0x20);
    lat+=((result&1)?~(result>>1):(result>>1));
    shift=0;result=0;
    do{b=str.charCodeAt(idx++)-63;result|=(b&0x1f)<<shift;shift+=5}while(b>=0x20);
    lng+=((result&1)?~(result>>1):(result>>1));
    coords.push([lat/1e6,lng/1e6]);
  }
  return coords;
}

// Geolocation
(function(){
  if(!navigator.geolocation)return;
  navigator.geolocation.getCurrentPosition(p=>{
    const la=p.coords.latitude,ln=p.coords.longitude;
    map.setView([la,ln],13);
    mkMe=L.marker([la,ln],{icon:ic('mk-me',''),interactive:false,zIndexOffset:999}).addTo(map);
    setPt('a',la,ln);
    revGeo(la,ln,n=>{document.getElementById('inA').value=n;showClr('a',true)});
  },()=>{},{enableHighAccuracy:true,timeout:8000});
})();

function useLoc(w){
  if(!navigator.geolocation){toast('Location unavailable');return}
  toast('Getting location...');
  navigator.geolocation.getCurrentPosition(p=>{
    const la=p.coords.latitude,ln=p.coords.longitude;
    setPt(w,la,ln);map.setView([la,ln],13);
    revGeo(la,ln,n=>{document.getElementById('in'+w.toUpperCase()).value=n;showClr(w,true)});
  },()=>toast('Location failed'),{enableHighAccuracy:true,timeout:8000});
}

function setPt(w,la,ln){
  if(w==='a'){
    ptA=[la,ln];if(mkA)map.removeLayer(mkA);
    mkA=L.marker([la,ln],{icon:ic('mk-a','A'),draggable:true}).addTo(map);
    mkA.on('dragend',e=>{const p=e.target.getLatLng();ptA=[p.lat,p.lng];revGeo(p.lat,p.lng,n=>{document.getElementById('inA').value=n});if(routeLn)calcRoute()});
  }else{
    ptB=[la,ln];if(mkB)map.removeLayer(mkB);
    mkB=L.marker([la,ln],{icon:ic('mk-b','B'),draggable:true}).addTo(map);
    mkB.on('dragend',e=>{const p=e.target.getLatLng();ptB=[p.lat,p.lng];revGeo(p.lat,p.lng,n=>{document.getElementById('inB').value=n});if(routeLn)calcRoute()});
  }
  updBtn();
}

function clrPt(w){
  if(w==='a'){ptA=null;if(mkA){map.removeLayer(mkA);mkA=null};document.getElementById('inA').value=''}
  else{ptB=null;if(mkB){map.removeLayer(mkB);mkB=null};document.getElementById('inB').value=''}
  showClr(w,false);clearRoute();updBtn();
}
function clearRoute(){
  if(routeLn){map.removeLayer(routeLn);routeLn=null}
  routeSteps=[];routeCoords=[];routeMeta=null;
  document.getElementById('statsBox').innerHTML='';
  document.getElementById('navBtn').disabled=true;
  document.getElementById('expBtn').disabled=true;
}
function showClr(w,v){document.getElementById('clr'+w.toUpperCase()).classList.toggle('hid',!v)}
function updBtn(){document.getElementById('goBtn').disabled=!(ptA&&ptB)}

// Search
function onType(w){curSug=w;const v=document.getElementById('in'+w.toUpperCase()).value;showClr(w,v.length>0);clearTimeout(gTimer);if(v.length<3){closeSug();return}gTimer=setTimeout(()=>geo(v),350)}
function onFocus(w){curSug=w;if(sugArr.length)openSug()}
function geo(q){
  fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(q)+'&format=json&limit=5&countrycodes=us')
    .then(r=>r.json()).then(res=>{
      sugArr=res;if(!res.length){closeSug();return}
      document.getElementById('sugBox').innerHTML=res.map((r,i)=>{
        const p=r.display_name.split(',');
        return '<div class="si" onclick="pick('+i+')"><span class="si-i">&#128205;</span><div><div class="si-m">'+p[0].trim()+'</div><div class="si-s">'+p.slice(1,4).join(',').trim()+'</div></div></div>';
      }).join('');openSug();
    });
}
function pick(i){
  const r=sugArr[i],la=+r.lat,ln=+r.lon;
  document.getElementById('in'+curSug.toUpperCase()).value=r.display_name.split(',').slice(0,3).join(',').trim();
  showClr(curSug,true);closeSug();setPt(curSug,la,ln);map.setView([la,ln],14);
  const o=curSug==='a'?'B':'A';
  if(!document.getElementById('in'+o).value)setTimeout(()=>document.getElementById('in'+o).focus(),120);
}
function openSug(){document.getElementById('sugBox').classList.add('open')}
function closeSug(){document.getElementById('sugBox').classList.remove('open');sugArr=[]}
function revGeo(la,ln,cb){
  fetch('https://nominatim.openstreetmap.org/reverse?lat='+la+'&lon='+ln+'&format=json&zoom=17')
    .then(r=>r.json()).then(d=>{cb(d.display_name?d.display_name.split(',').slice(0,3).join(',').trim():la.toFixed(4)+', '+ln.toFixed(4))}).catch(()=>cb(la.toFixed(4)+', '+ln.toFixed(4)));
}

// Avoid zones - these feed directly into Valhalla exclude_locations
function togAvoid(){avoidOn=!avoidOn;document.getElementById('avBtn').classList.toggle('on',avoidOn);toast(avoidOn?'Tap a road to avoid it':'Avoid mode off')}

function addAv(la,ln){
  // Small red circle on the road to show what's excluded
  const ci=L.circleMarker([la,ln],{radius:8,color:'#ef4444',fillColor:'#ef4444',fillOpacity:.6,weight:2}).addTo(map);
  const id=Date.now(),z={id,lat:la,lng:ln,name:'',ci};
  avoids.push(z);
  revGeo(la,ln,n=>{z.name=n.split(',')[0].trim();renChips()});
  ci.on('click',()=>remAv(id));
  renChips();
  if(routeLn)calcRoute();
}

function remAv(id){
  const i=avoids.findIndex(z=>z.id===id);if(i<0)return;
  map.removeLayer(avoids[i].ci);avoids.splice(i,1);renChips();if(routeLn)calcRoute();
}

function renChips(){document.getElementById('chipBox').innerHTML=avoids.map(z=>'<div class="chip">'+(z.name||'...')+'<button onclick="remAv('+z.id+')">&times;</button></div>').join('')}

// =========== VALHALLA ROUTING ===========
function calcRoute(){
  if(!ptA||!ptB)return;
  toast('Routing...');

  const body={
    locations:[
      {lat:ptA[0],lon:ptA[1]},
      {lat:ptB[0],lon:ptB[1]}
    ],
    costing:'auto',
    directions_options:{units:'miles'},
    costing_options:{auto:{}}
  };

  // Add exclude_locations for avoided roads
  if(avoids.length){
    body.exclude_locations=avoids.map(z=>({lat:z.lat,lon:z.lng}));
  }

  fetch(VALHALLA+'/route',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  })
  .then(r=>{
    if(!r.ok)return r.json().then(e=>{throw e});
    return r.json();
  })
  .then(data=>{
    const trip=data.trip;
    if(!trip){toast('No route found');return}

    // Decode shape
    const coords=decodePoly(trip.legs[0].shape);
    routeCoords=coords.map(c=>({lat:c[0],lng:c[1]}));

    // Draw route
    if(routeLn)map.removeLayer(routeLn);
    routeLn=L.polyline(coords,{color:'#3b82f6',weight:4,opacity:.85}).addTo(map);
    map.fitBounds(routeLn.getBounds(),{padding:[80,80]});

    // Extract maneuvers
    routeSteps=[];
    trip.legs.forEach(leg=>{
      leg.maneuvers.forEach(m=>{
        routeSteps.push({
          instruction:m.instruction||'Continue',
          road:m.street_names?m.street_names.join(', '):'',
          distance:m.length*1609.34, // miles to meters
          distanceMi:m.length,
          duration:m.time,
          lat:coords[m.begin_shape_index][0],
          lng:coords[m.begin_shape_index][1],
          type:m.type
        });
      });
    });

    routeMeta={
      distance:trip.summary.length, // miles
      duration:trip.summary.time    // seconds
    };

    const mi=trip.summary.length.toFixed(1);
    const dur=Math.round(trip.summary.time/60);
    const h=Math.floor(dur/60),m=dur%60;
    document.getElementById('statsBox').innerHTML=
      '<span><span class="v">'+mi+' mi</span></span><span><span class="v">'+(h?h+'h ':'')+m+'m</span></span>'+
      (avoids.length?'<span>Avoiding <span class="v">'+avoids.length+'</span> road'+(avoids.length>1?'s':'')+'</span>':'')+
      '<span class="v">'+routeSteps.length+' steps</span>';
    document.getElementById('navBtn').disabled=false;
    document.getElementById('expBtn').disabled=false;
  })
  .catch(e=>{
    console.error('Valhalla error:',e);
    if(e&&e.error_code===171){
      toast('No route possible avoiding those roads');
    }else if(e&&e.status_message){
      toast('Route failed: '+e.status_message);
    }else{
      toast('Routing error');
    }
  });
}

// =========== NAVIGATION ===========
async function startNav(){
  if(!routeSteps.length){toast('Calculate a route first');return}
  if(!navigator.geolocation){toast('Location required');return}
  navActive=true;navStepIdx=0;navMuted=false;
  document.getElementById('planSearch').style.display='none';
  document.getElementById('planPanel').style.display='none';
  document.getElementById('navHud').classList.add('active');
  document.getElementById('muteBtn').textContent='Mute';
  try{if('wakeLock' in navigator){wakeLock=await navigator.wakeLock.request('screen')}}catch(e){}
  updateNavHud();
  speak(routeSteps[0].instruction);
  navWatchId=navigator.geolocation.watchPosition(onNavPos,()=>toast('GPS signal lost'),{enableHighAccuracy:true,maximumAge:2000,timeout:10000});
}

function endNav(){
  navActive=false;
  if(navWatchId!==null){navigator.geolocation.clearWatch(navWatchId);navWatchId=null}
  if(wakeLock){wakeLock.release().catch(()=>{});wakeLock=null}
  speechSynthesis.cancel();
  document.getElementById('navHud').classList.remove('active');
  document.getElementById('planSearch').style.display='';
  document.getElementById('planPanel').style.display='';
}

function onNavPos(pos){
  const la=pos.coords.latitude,ln=pos.coords.longitude;
  if(mkMe){mkMe.setLatLng([la,ln])}
  else{mkMe=L.marker([la,ln],{icon:ic('mk-me',''),interactive:false,zIndexOffset:999}).addTo(map)}
  map.setView([la,ln],16);

  if(navStepIdx<routeSteps.length){
    const s=routeSteps[navStepIdx];
    const d=haversine(la,ln,s.lat,s.lng);
    if(d<40&&navStepIdx<routeSteps.length-1){
      navStepIdx++;updateNavHud();
      speak(routeSteps[navStepIdx].instruction);
    }
    // Pre-announce next step
    if(navStepIdx<routeSteps.length-1){
      const next=routeSteps[navStepIdx+1];
      if(next){
        const dNext=haversine(la,ln,next.lat,next.lng);
        if(dNext<200&&dNext>150){
          speak('In '+Math.round(dNext)+' meters, '+next.instruction);
        }
      }
    }
    if(navStepIdx===routeSteps.length-1&&d<30){
      speak('You have arrived at your destination');
      setTimeout(endNav,3000);
    }
  }

  let rem=0;
  for(let i=navStepIdx;i<routeSteps.length;i++)rem+=routeSteps[i].distanceMi||0;
  const mi=rem.toFixed(1);
  const avgSpeed=routeMeta.distance/(routeMeta.duration/3600);
  const durSec=rem/avgSpeed*3600;
  const h=Math.floor(durSec/3600),m=Math.round((durSec%3600)/60);
  document.getElementById('navRemain').textContent=mi+' mi remaining';
  document.getElementById('navEta').textContent=(h?h+'h ':'')+m+'m';
}

function updateNavHud(){
  const s=routeSteps[navStepIdx];if(!s)return;
  const dMi=s.distanceMi||0;
  const distStr=dMi<0.2?Math.round(dMi*5280)+' ft':dMi.toFixed(1)+' mi';
  document.getElementById('navDist').textContent=distStr;
  document.getElementById('navMan').textContent=s.instruction;
  document.getElementById('navRoad').textContent=s.road?'on '+s.road:'';
}

function speak(text){
  if(navMuted||!('speechSynthesis' in window))return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=1.0;u.pitch=1.0;u.volume=1.0;
  speechSynthesis.speak(u);
}

function togMute(){navMuted=!navMuted;document.getElementById('muteBtn').textContent=navMuted?'Unmute':'Mute';if(navMuted)speechSynthesis.cancel();toast(navMuted?'Voice muted':'Voice on')}

function haversine(la1,ln1,la2,ln2){
  const R=6371000,dLa=(la2-la1)*Math.PI/180,dLn=(ln2-ln1)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLn/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// =========== EXPORT ===========
function openExport(){
  if(!ptA||!ptB||!routeSteps.length){toast('Route first');return}
  // Sample waypoints along the actual route to preserve avoidance in external nav
  const wps=getExportWaypoints();
  let gUrl='https://www.google.com/maps/dir/'+ptA[0]+','+ptA[1];
  wps.forEach(w=>{gUrl+='/'+w[0]+','+w[1]});
  gUrl+='/'+ptB[0]+','+ptB[1];

  // Apple Maps supports waypoints via intermediate daddr params
  let aUrl='https://maps.apple.com/?saddr='+ptA[0]+','+ptA[1]+'&daddr='+ptB[0]+','+ptB[1]+'&dirflg=d';

  document.getElementById('expGoogle').href=gUrl;
  document.getElementById('expApple').href=aUrl;
  document.getElementById('expCopy').dataset.url=gUrl;
  document.getElementById('exportModal').classList.add('open');
}

function getExportWaypoints(){
  if(!routeCoords.length)return [];
  // Sample waypoints at even intervals to preserve the route shape
  const wp=[];
  const total=routeCoords.length;
  const numWp=Math.min(8,Math.max(3,Math.floor(total/20)));
  const step=Math.floor(total/(numWp+1));
  for(let i=1;i<=numWp;i++){
    const c=routeCoords[Math.min(i*step,total-1)];
    wp.push([c.lat,c.lng]);
  }
  return wp;
}

function copyRouteLink(){
  const url=document.getElementById('expCopy').dataset.url;
  navigator.clipboard.writeText(url).then(()=>{toast('Link copied');closeExport()}).catch(()=>toast('Copy failed'));
}
function closeExport(){document.getElementById('exportModal').classList.remove('open')}

// Map interactions
map.on('click',e=>{
  hideCtx();closeSug();
  if(navActive)return;
  if(avoidOn){addAv(e.latlng.lat,e.latlng.lng);return}
  if(!ptA){setPt('a',e.latlng.lat,e.latlng.lng);revGeo(e.latlng.lat,e.latlng.lng,n=>{document.getElementById('inA').value=n;showClr('a',true)});return}
  if(!ptB){setPt('b',e.latlng.lat,e.latlng.lng);revGeo(e.latlng.lat,e.latlng.lng,n=>{document.getElementById('inB').value=n;showClr('b',true)});return}
});

map.on('contextmenu',e=>{
  if(navActive)return;
  e.originalEvent.preventDefault();const m=document.getElementById('ctx');
  m.innerHTML='<div class="cl">Set as</div><button onclick="ctxP(\'a\','+e.latlng.lat+','+e.latlng.lng+')">Start</button><button onclick="ctxP(\'b\','+e.latlng.lat+','+e.latlng.lng+')">Destination</button><div class="cl">Mark</div><button onclick="ctxA('+e.latlng.lat+','+e.latlng.lng+')">Avoid this road</button>';
  m.style.left=Math.min(e.originalEvent.clientX,innerWidth-160)+'px';m.style.top=Math.min(e.originalEvent.clientY,innerHeight-140)+'px';m.style.display='block';
});

function ctxP(w,la,ln){hideCtx();setPt(w,la,ln);revGeo(la,ln,n=>{document.getElementById('in'+w.toUpperCase()).value=n;showClr(w,true)})}
function ctxA(la,ln){hideCtx();addAv(la,ln)}
function hideCtx(){document.getElementById('ctx').style.display='none'}

function clearAll(){
  clrPt('a');clrPt('b');
  avoids.forEach(z=>{map.removeLayer(z.ci)});
  avoids=[];renChips();clearRoute();
  avoidOn=false;document.getElementById('avBtn').classList.remove('on');
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
document.addEventListener('click',e=>{if(!e.target.closest('.ctx'))hideCtx();if(!e.target.closest('.search-bar'))closeSug();if(e.target.classList.contains('modal-bg'))closeExport()});
</script>
